# Full KapitanChat stack: Django backend, React/Vite frontend, FastAPI storage
# service, and a Redis instance for Django Channels.
#
# Configuration lives in .env (see .env.example). Bring it up with:
#   docker compose up --build

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./KapitanChat/kapitan_chat_backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CORS_ALLOW_ALL: ${DJANGO_CORS_ALLOW_ALL}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      DJANGO_DB_PATH: /app/data/db.sqlite3
      REDIS_URL: ${REDIS_URL}
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - backend-data:/app/data
      - backend-media:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request,sys; h=os.environ.get('DJANGO_ALLOWED_HOSTS','localhost').split(',')[0].strip(); h='localhost' if h in ('','*') else h; sys.exit(0 if urllib.request.urlopen(urllib.request.Request('http://localhost:8000/admin/login/',headers={'Host':h}),timeout=5).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

  storage:
    build:
      context: ./StorageService
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      STORAGE_PORT: ${STORAGE_PORT}
      STORAGE_HOST: 0.0.0.0
      STORAGE_ORIGINS: ${STORAGE_ORIGINS}
      STORAGE_FILES_DIR: /app/files
      STORAGE_DB_PATH: /app/data/database.sqlite3
    ports:
      - "${STORAGE_PORT}:8001"
    volumes:
      - storage-files:/app/files
      - storage-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/openapi.json', timeout=5).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./KapitanChat/kapitan_chat_frontend
      args:
        VITE_BASEAPI: ${VITE_BASEAPI}
        VITE_BASE_WS_URL: ${VITE_BASE_WS_URL}
        VITE_BASE_FMS_URL: ${VITE_BASE_FMS_URL}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
      storage:
        condition: service_healthy

volumes:
  redis-data:
  backend-data:
  backend-media:
  storage-files:
  storage-data:
